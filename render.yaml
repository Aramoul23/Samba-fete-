# Render Blueprint — Samba Fête Staging
# Deploy: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: samba-fete-staging
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    buildCommand: bash render_build.sh
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
    healthCheckPath: /health
    autoDeploy: true

  - type: pserv
    name: samba-fete-db-staging
    plan: free
    region: frankfurt
    databaseName: samba_fete
    postgresMajorVersion: "16"
