{% extends "base.html" %}
{% block title %}Événements - Samba Fête{% endblock %}
{% block page_title %}Événements{% endblock %}

{% block content %}
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-5">
                <label class="form-label small text-muted">Rechercher</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="searchInput" class="form-control"
                           placeholder="Nom du client ou titre..."
                           value="{{ search }}"
                           hx-get="/evenements"
                           hx-trigger="input changed delay:300ms"
                           hx-target="#eventList"
                           hx-include="#statusFilter"
                           name="q">
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted">Statut</label>
                <select id="statusFilter" class="form-select" name="status"
                        hx-get="/evenements"
                        hx-trigger="change"
                        hx-target="#eventList"
                        hx-include="#searchInput">
                    <option value="">Tous les statuts</option>
                    {% for s in statuses %}
                    <option value="{{ s }}" {% if status_filter == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-2">
                <a href="/evenement/nouveau" class="btn btn-primary w-100">
                    <i class="fas fa-plus"></i> Nouveau
                </a>
            </div>
            <div class="col-md-2">
                <a href="/export/events.ods" class="btn btn-outline-success w-100">
                    <i class="fas fa-file-excel"></i> Export
                </a>
            </div>
        </div>
    </div>
</div>

<div id="eventList">
    {% include "bookings/_event_list_table.html" %}
</div>
{% endblock %}
