{% extends "base.html" %}
{% block title %}Calendrier - Samba Fête{% endblock %}
{% block page_title %}Calendrier{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="fullcalendar"></div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow-sm mb-3">
            <div class="card-header">
                <h6 class="mb-0"><i class="fas fa-filter me-2"></i>Filtrer par lieu</h6>
            </div>
            <div class="card-body">
                <form method="GET" id="venueFilterForm">
                    <select name="venue" class="form-select" onchange="this.form.submit()">
                        <option value="">Tous les lieux</option>
                        {% for v in venues %}
                        <option value="{{ v.id }}" {% if venue_filter == v.id|string %}selected{% endif %}>
                            {{ v.name }}
                        </option>
                        {% endfor %}
                    </select>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header">
                <h6 class="mb-0"><i class="fas fa-info-circle me-2"></i>Légende</h6>
            </div>
            <div class="card-body">
                <div class="d-flex align-items-center mb-2">
                    <span class="badge me-2" style="background:#ef476f">&nbsp;</span> Confirmé
                </div>
                <div class="d-flex align-items-center mb-2">
                    <span class="badge me-2" style="background:#ffd166">&nbsp;</span> En attente
                </div>
                <div class="d-flex align-items-center">
                    <span class="badge me-2" style="background:#118ab2">&nbsp;</span> Changé de date
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    initCalendar('fullcalendar', '/api/calendar-events');
});
</script>
<style>
/* Day cell base styling */
.fc-daygrid-day { cursor: default; }
.fc-daygrid-day:hover { filter: brightness(1.08); }

/* Safety net: hide any residual event elements */
.fc-daygrid-day-events,
.fc-daygrid-event-harness,
.fc-daygrid-event,
.fc-h-event,
.fc-event,
.fc-daygrid-more-link {
    display: none !important;
    height: 0 !important;
    min-height: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
}
</style>
{% endblock %}
