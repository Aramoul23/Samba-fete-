{% extends "base.html" %}
{% block title %}Clients - Samba Fête{% endblock %}
{% block page_title %}Clients{% endblock %}

{% block content %}
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-end">
            <div class="col-md-6">
                <label class="form-label small text-muted">Rechercher un client</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" id="searchClient" class="form-control"
                           placeholder="Nom, téléphone ou email..."
                           value="{{ search }}"
                           hx-get="/clients"
                           hx-trigger="input changed delay:300ms"
                           hx-target="#clientList"
                           name="q">
                </div>
            </div>
            <div class="col-md-3">
                <a href="/export/clients.ods" class="btn btn-outline-success w-100">
                    <i class="fas fa-file-excel"></i> Export ODS
                </a>
            </div>
        </div>
    </div>
</div>

<div id="clientList">
    {% include "clients/_client_list_table.html" %}
</div>
{% endblock %}
