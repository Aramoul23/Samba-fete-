name: Railway Keep-Alive

on:
  schedule:
    - cron: "*/5 * * * *" # Every 5 minutes
  workflow_dispatch: # Run manually if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Railway App
        run: |
          echo "Pinging Samba Fête to keep it alive..."
          response=$(curl -s -o /dev/null -w "%{http_code}" https://web-production-089fe.up.railway.app)
          echo "Response code: $response"
          if [ "$response" -eq 200 ] || [ "$response" -eq 302 ]; then
            echo "✅ App is alive!"
          else
            echo "⚠️ Unexpected response: $response"
          fi
