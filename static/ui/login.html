<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Samba Fête | Digital Concierge Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-tertiary-container": "#005783",
                        "on-surface": "#d6e3ff",
                        "tertiary": "#cce6ff",
                        "on-error-container": "#ffdad6",
                        "on-secondary": "#3b2f05",
                        "error-container": "#93000a",
                        "tertiary-container": "#90cdff",
                        "on-secondary-container": "#cbb780",
                        "on-primary-container": "#655000",
                        "background": "#041329",
                        "surface-variant": "#27354d",
                        "error": "#ffb4ab",
                        "surface-tint": "#e9c349",
                        "on-primary": "#3c2f00",
                        "surface-dim": "#041329",
                        "primary-fixed": "#ffe087",
                        "secondary": "#dac58d",
                        "primary-fixed-dim": "#e9c349",
                        "on-background": "#d6e3ff",
                        "surface-container-low": "#0d1c32",
                        "secondary-fixed": "#f7e1a6",
                        "outline": "#99907c",

                        "on-surface-variant": "#d0c6af",

                        "surface": "#041329"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif", "serif"],
                        "body": ["Manrope", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        body {
            background-color: #041329;
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(44, 57, 81, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(233, 195, 73, 0.15);
        }
        .gold-gradient {
            background: linear-gradient(135deg, #ffe088 0%, #e9c349 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .midnight-glow {
            box-shadow: 0 0 60px 0 rgba(1, 14, 36, 0.8);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between selection:bg-primary/30">
<!-- Hero Background Element (Ambient) -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-surface-container-high/20 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[100px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full opacity-20" style="background-image: radial-gradient(circle at center, #1c2a41 0%, transparent 70%);"></div>
</div>
<!-- Top AppBar (Identity Only) -->
<header class="relative z-10 w-full px-8 py-8 flex justify-center items-center">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined text-primary text-4xl mb-2" data-icon="star_rate" style="font-variation-settings: 'FILL' 1;">star_rate</span>
<h1 class="font-headline text-3xl tracking-tighter text-primary-container">Samba Fête</h1>
</div>
</header>
<!-- Main Content: Login Canvas -->
<main class="relative z-10 flex-1 w-full max-w-md px-6 flex items-center justify-center">
<div class="glass-card w-full rounded-xl p-10 midnight-glow flex flex-col items-center">
<div class="text-center mb-10">
<p class="font-label text-[10px] uppercase tracking-[0.3em] text-secondary font-semibold">Event Management Suite</p>
<h2 class="font-headline text-2xl text-on-surface mt-2 opacity-90">Welcome Back</h2>
</div>
<form class="w-full space-y-8">
<!-- Username -->
<div class="relative group">
<div class="absolute left-0 bottom-3 text-outline group-focus-within:text-primary transition-colors duration-300">
<span class="material-symbols-outlined text-lg" data-icon="person">person</span>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 pb-3 pl-8 text-on-surface font-body placeholder:text-outline/50 focus:ring-0 focus:border-primary transition-all duration-300" placeholder="Username" type="text"/>
</div>
<!-- Password -->
<div class="relative group">
<div class="absolute left-0 bottom-3 text-outline group-focus-within:text-primary transition-colors duration-300">
<span class="material-symbols-outlined text-lg" data-icon="lock">lock</span>
</div>
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 pb-3 pl-8 pr-8 text-on-surface font-body placeholder:text-outline/50 focus:ring-0 focus:border-primary transition-all duration-300" placeholder="Password" type="password"/>
<button class="absolute right-0 bottom-3 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-xs font-label uppercase tracking-widest text-primary/80 hover:text-primary transition-colors duration-300" href="#">
                        Forgot Password?
                    </a>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="gold-gradient w-full py-4 rounded-lg font-body font-bold text-on-primary text-sm uppercase tracking-widest shadow-lg shadow-primary/10 hover:scale-[1.02] active:scale-[0.98] transition-all duration-300" type="submit">
                        Connexion
                    </button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/20 w-full text-center">
<p class="text-xs text-outline font-body">Don't have access? <a class="text-secondary hover:underline underline-offset-4" href="#">Request a key</a></p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="relative z-10 w-full py-8 flex flex-col items-center gap-4">
<div class="flex gap-6">
<a class="font-label text-[10px] uppercase tracking-[0.15em] text-outline-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label text-[10px] uppercase tracking-[0.15em] text-outline-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
</div>
<p class="font-label text-[10px] uppercase tracking-[0.2em] text-outline-variant/60">
            Samba Fête © 2026. The Digital Concierge.
        </p>
</footer>
<!-- Decorative Elements (The "Asymmetry") -->
<div class="fixed top-20 -right-20 opacity-10 pointer-events-none transform rotate-12">
<img alt="" class="w-96 h-96 object-cover rounded-full mix-blend-screen" data-alt="abstract architectural shot of a luxury building interior with dramatic lighting and gold details" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJvZfSOw3bv3jGvcFkD3vklUBrMqTPczrO-Az9DEKgd6KQtOvJRBNM-br0f6ZJD0R34n-oKWryoE7B1mNzPyIQ5kelxoKzC18gEYOjsdQQYzi8Ievn6EsfWftX4REY7CLi1Fqs96JIK0uv-udnV7fIy1hq1pGSgbomns40GSf2eXz7LY5qA50jpk7SFlHqUwJ65QbAVcOFmwV-LHeecKspLWscVX0O0_7obtKs6V2Qyfn02f8eFI4lQ0VMNJuKkTJbgSGbX9lceD2_"/>
</div>
<div class="fixed bottom-20 -left-20 opacity-10 pointer-events-none transform -rotate-12">
<img alt="" class="w-[500px] h-[500px] object-cover rounded-full mix-blend-screen" data-alt="blurred bokeh lights of a high-end gala event with warm gold and deep blue tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAbUNW5hWcGk7skQ5rBH0Y1Ze4TfB44V4F9cmzhTg8zwUsMGh1PsB1L_QtdKlgWHjLLzg3cSljCMlvXFJPBrcHSM7RZjOcXoxtvsJxQxL-PuHyO-DbEwynz-kkwUm4S7HQkFrWhDcvr4Za9cWtfPP3QH72G-eWCWmNzp9gGHnntTeYcKlm3LFOqcb7wHNrrw20Dr1g251dLpqRKITSFNCpOZ7zyMqKIkCC8EUz8kPKEb_jxWT1NcHJ_PCSMTQGgR51h_YAvWUheRk0J"/>
</div>
</body></html>
